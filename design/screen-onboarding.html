<!-- @dsCard group="Màn hình" name="Onboarding" subtitle="Vào thẳng trải nghiệm — một hành động đầu tiên rõ ràng" viewport="450x920" -->
<meta charset="utf-8">
<title>WonderLens — Màn Onboarding</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:#15233B;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;padding:28px;background:#E9EEF6}
.phone{position:relative;margin:auto;flex:none;width:390px;height:844px;border-radius:54px;overflow:hidden;box-shadow:0 30px 80px rgba(11,18,32,.35),0 0 0 10px #0B1220,0 0 0 12px #33405c;
background:radial-gradient(400px 320px at 15% 10%,rgba(38,198,218,.22),transparent 60%),radial-gradient(360px 300px at 90% 30%,rgba(183,148,244,.22),transparent 60%),radial-gradient(420px 340px at 50% 100%,rgba(255,200,87,.16),transparent 60%),linear-gradient(180deg,#EAF8FB,#F4EFFF)}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:122px;height:34px;border-radius:20px;background:#0B1220;z-index:60}
.status{position:absolute;top:16px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 30px;z-index:55;font-size:14px;font-weight:800;color:#15233B}
.home{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:99px;background:rgba(11,18,32,.8);z-index:60}
.content{position:absolute;inset:0;padding:90px 26px 34px;display:flex;flex-direction:column;align-items:center;text-align:center}
.heroRing{position:relative;width:150px;height:150px;margin:36px 0 8px}
.ring,.glow{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#26C6DA,#38BDF8,#B794F4,#FFC857,#5EEAD4,#26C6DA);animation:spin 7s linear infinite}
.ring{-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 17px),#000 calc(100% - 16px));mask:radial-gradient(farthest-side,transparent calc(100% - 17px),#000 calc(100% - 16px))}
.glow{-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 26px),#000 calc(100% - 25px));mask:radial-gradient(farthest-side,transparent calc(100% - 26px),#000 calc(100% - 25px));filter:blur(9px);opacity:.85}
.core{position:absolute;inset:20%;border-radius:50%;background:radial-gradient(circle at 50% 38%,#fff 55%,#EAF8FB);box-shadow:0 4px 14px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;color:#0E97AC}
.sp{position:absolute}
@keyframes spin{to{transform:rotate(1turn)}}
h1{font-size:28px;font-weight:900;letter-spacing:.2px;line-height:1.1;margin-top:22px}
p{font-size:15px;font-weight:700;line-height:1.45;color:#54657F;max-width:300px;margin-top:12px}
.chips{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.chip{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:999px;font-size:13px;font-weight:800;border:1px solid rgba(255,255,255,.7);background:linear-gradient(180deg,rgba(255,255,255,.75),rgba(255,255,255,.55));box-shadow:0 4px 10px rgba(0,0,0,.06);color:#15233B}
.chip svg{color:#0E97AC}
.btn{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;height:58px;width:100%;margin-top:auto;border:1px solid rgba(255,255,255,.35);border-radius:20px;background:linear-gradient(135deg,#22D3EE,#26C6DA,#38BDF8);color:#fff;font-size:17px;font-weight:900;letter-spacing:.2px;box-shadow:0 0 22px 1px rgba(38,198,218,.45)}
.btn::before{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 50%);pointer-events:none}
.tbtn{padding:14px 16px;font-size:15px;font-weight:800;color:#54657F}
.safe{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:#54657F}
</style>

<div class="phone">
  <div class="island"></div>
  <div class="status"><span>9:41</span><span style="display:flex;gap:6px;align-items:center">
    <svg width="18" height="12" viewBox="0 0 18 12" fill="#15233B"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
    <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="0" width="21" height="12" rx="4" fill="none" stroke="#15233B" stroke-opacity=".4"/><rect x="2" y="2" width="14" height="8" rx="2" fill="#15233B"/><rect x="22.5" y="3.5" width="2.5" height="5" rx="1" fill="#15233B" opacity=".4"/></svg>
  </span></div>

  <div class="content">
    <div class="heroRing">
      <div class="glow"></div><div class="ring"></div>
      <div class="core"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21"/></svg></div>
      <svg class="sp" style="top:-8px;right:-16px" width="26" height="26" viewBox="0 0 24 24" fill="#FFC857"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8L12 2z"/></svg>
      <svg class="sp" style="bottom:2px;left:-20px" width="18" height="18" viewBox="0 0 24 24" fill="#B794F4"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8L12 2z"/></svg>
    </div>

    <h1>Soi thế giới<br>quanh em!</h1>
    <p>Chĩa camera vào một đồ vật quanh nhà — WonderLens sẽ kể em nghe hành trình của nó.</p>

    <div class="chips">
      <span class="chip"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l2-3h6l2 3h3v12H4z"/><circle cx="12" cy="13.5" r="3.4"/></svg>Chụp</span>
      <span class="chip"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/></svg>Nghe kể chuyện</span>
      <span class="chip"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.2L21 9l-5 4.2 1.6 6.8L12 16.4 6.4 20 8 13.2 3 9l6.8-.8L12 2z"/></svg>Sưu tập</span>
    </div>

    <div class="btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21"/></svg>Bắt đầu khám phá</div>
    <div class="tbtn">Ba mẹ xem trước</div>
    <div class="safe"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0B7A6A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3v6c0 5-3.5 9-8 11-4.5-2-8-6-8-11V5l8-3z"/><path d="M8.5 12l2.5 2.5 4.5-5"/></svg>An toàn cho bé 6–10 tuổi · Hero hoạt động offline</div>
  </div>

  <div class="home"></div>
</div>
