<meta charset="utf-8">
<title>WonderLens — Màn Bộ sưu tập</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:#15233B;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;padding:28px;background:#E9EEF6}
.phone{position:relative;margin:auto;flex:none;width:390px;height:844px;border-radius:54px;overflow:hidden;box-shadow:0 30px 80px rgba(11,18,32,.35),0 0 0 10px #0B1220,0 0 0 12px #33405c;
background:radial-gradient(380px 300px at 12% 6%,rgba(38,198,218,.18),transparent 60%),radial-gradient(340px 280px at 92% 22%,rgba(255,200,87,.16),transparent 60%),radial-gradient(400px 320px at 50% 104%,rgba(183,148,244,.16),transparent 60%),linear-gradient(180deg,#EAF8FB,#F4EFFF)}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:122px;height:34px;border-radius:20px;background:#0B1220;z-index:60}
.status{position:absolute;top:16px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 30px;z-index:55;font-size:14px;font-weight:800;color:#15233B}
.home{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:99px;background:rgba(11,18,32,.8);z-index:60}
.content{position:absolute;inset:0;padding:64px 18px 0;display:flex;flex-direction:column;gap:12px}
.glass{position:relative;border-radius:28px;border:1px solid rgba(255,255,255,.55);background:linear-gradient(180deg,rgba(255,255,255,.51),rgba(255,255,255,.46));-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);box-shadow:0 8px 18px rgba(0,0,0,.1)}
.glass::before{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.30),transparent 55%);pointer-events:none}
.glass::after{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.2px;background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(255,255,255,0) 55%,rgba(255,255,255,.21));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;pointer-events:none}
.hdr{display:flex;align-items:center;justify-content:space-between}
.title{font-size:21px;font-weight:900;letter-spacing:.2px}
.chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:999px;font-size:13px;font-weight:800}
.chip.sunny{color:#7A4E00;background:linear-gradient(180deg,rgba(255,200,87,.42),rgba(255,200,87,.26));border:1px solid rgba(255,200,87,.5)}
.chip.grape{color:#7A4FC4;background:linear-gradient(180deg,rgba(183,148,244,.3),rgba(183,148,244,.18));border:1px solid rgba(183,148,244,.4)}
.prog{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.prog .t{font-size:13px;font-weight:800}
.prog .row{display:flex;align-items:center;gap:10px}
.bar{flex:1;height:12px;border-radius:99px;background:rgba(84,101,127,.15);overflow:hidden}
.bar i{display:block;height:100%;width:70%;border-radius:99px;background:linear-gradient(90deg,#22D3EE,#26C6DA,#38BDF8)}
.prog .n{font-size:12.5px;font-weight:800;color:#0E97AC;font-variant-numeric:tabular-nums}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{padding:8px 10px 10px;display:flex;flex-direction:column;gap:6px;align-items:center;text-align:center}
.ph{width:100%;height:86px;border-radius:20px;display:flex;align-items:center;justify-content:center}
.tile h3{font-size:15px;font-weight:900}
.tile .chip{height:26px;padding:0 11px;font-size:12px}
.chip.teal{color:#0E97AC;background:linear-gradient(180deg,rgba(38,198,218,.26),rgba(38,198,218,.16));border:1px solid rgba(38,198,218,.35)}
.chip.plain{color:#54657F;background:linear-gradient(180deg,rgba(255,255,255,.8),rgba(255,255,255,.6));border:1px solid rgba(255,255,255,.8)}
.chip.mint{color:#0B7A6A;background:linear-gradient(180deg,rgba(94,234,212,.36),rgba(94,234,212,.2));border:1px solid rgba(94,234,212,.5)}
.tile.lock{border-style:dashed;border-color:rgba(84,101,127,.3);background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.24));box-shadow:none}
.tile.lock::after,.tile.lock::before{display:none}
.tile.lock .ph{color:#8fa0b8}
.tile.lock h3{color:#8fa0b8}
.sect{display:flex;align-items:center;gap:8px;margin-top:2px}
.sect h2{font-size:16px;white-space:nowrap;font-weight:900;color:#7A4FC4}
.sect .cap{font-size:12px;font-weight:700;color:#54657F;margin-left:auto}
.jrow{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:22px}
.jrow .ic{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 45% 35%,rgba(183,148,244,.35),rgba(183,148,244,.15));display:flex;align-items:center;justify-content:center;flex:none}
.jrow .tx{flex:1}
.jrow h3{font-size:15px;font-weight:900}
.jrow .cap{font-size:12px;font-weight:700;color:#54657F}
</style>
